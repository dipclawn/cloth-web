<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="🌀 旗面网页 - Three.js 布料物理模拟，网页内容像旗帜一样挂在旗杆上">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cloth Web">
<title>🌀 旗面网页 - 3D布料物理模拟</title>
<link rel="icon" href="web/icon-192.png">
<link rel="apple-touch-icon" href="web/icon-192.png">
<link rel="manifest" href="web/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#e2e8f0;width:100vw;height:100vh}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(5,5,16,.88);backdrop-filter:blur(8px);padding:8px 16px;border-radius:10px;font-size:11px;z-index:10;text-align:center;border:1px solid rgba(255,255,255,.06);pointer-events:none;white-space:nowrap}
#info span{display:inline-block;margin:0 6px}
#controls{position:fixed;top:12px;right:12px;z-index:10;display:flex;flex-direction:column;gap:4px}
#controls button{background:rgba(5,5,16,.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);color:#e2e8f0;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:11px;transition:.15s;min-width:60px;text-align:center}
#controls button:hover{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.3)}
#controls button.active{background:rgba(99,102,241,.35);border-color:#6366f1}
#header{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none}
#header h1{font-size:13px;font-weight:600;background:rgba(5,5,16,.65);backdrop-filter:blur(8px);padding:6px 14px;border-radius:8px;display:inline-block;border:1px solid rgba(255,255,255,.05)}
#header h1 small{font-weight:400;font-size:9px;color:#94a3b8}
#urlInput{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;background:rgba(5,5,16,.85);backdrop-filter:blur(8px);padding:6px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.06)}
#urlInput input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#e2e8f0;padding:5px 8px;border-radius:5px;font-size:11px;outline:none;width:170px;font-family:inherit}
#urlInput input:focus{border-color:#6366f1}
#urlInput button{background:#6366f1;border:none;color:#fff;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px}
canvas{touch-action:none;-webkit-touch-callout:none}
@media(max-width:480px){#header h1{font-size:11px;padding:4px 10px}#urlInput input{width:120px;font-size:10px}#info{font-size:9px;padding:4px 10px;white-space:normal}}
</style>
</head>
<body>

<div id="header"><h1>🌀 旗面网页 <small>布料物理</small></h1></div>

<div id="urlInput">
  <input id="url" value="https://dipclawn.github.io/expense-tracker/" placeholder="网页URL...">
  <button onclick="loadWebPage()">加载</button>
</div>

<div id="controls">
  <button class="active" onclick="toggleWind()" id="windBtn">🌬️ 风</button>
  <button onclick="resetCloth()">↺ 重置</button>
</div>

<div id="info">
  <span>🖱️ 拖拽旗面</span>
  <span>🔍 滚动缩放</span>
  <span class="key">SHIFT</span>拖拽旋转
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ====== 全局 ======
var scene,camera,renderer,clothMesh,clothGeometry;
var particles=[],constraints=[];
var wind={x:0.06,y:0,z:0.01};
var windEnabled=true;
var mouse=new THREE.Vector2(),mouse3D=new THREE.Vector3(),raycaster=new THREE.Raycaster();
var isDragging=false,dragParticle=null,isRotating=false;
var prevMouse={x:0,y:0},rotation={x:0,y:0};

// ====== 布料参数（旗帜比例，宽>高） ======
var W=22,H=14,SPACING=0.28;
var DAMPING=0.985,GRAVITY=-0.6,STIFFNESS=0.5;
var canvas,ctx;

// ====== 网页纹理 ======
function initTexture(){
  canvas=document.createElement('canvas');
  canvas.width=1024;canvas.height=768;
  ctx=canvas.getContext('2d');
  drawWebContent('https://dipclawn.github.io/expense-tracker/');
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();
}

function drawWebContent(url){
  var w=canvas.width,h=canvas.height;
  ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,w,h);
  // 导航
  ctx.fillStyle='#4f46e5';roundRect(ctx,0,0,w,44,12);
  ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';ctx.fillText('💰 记账本',20,30);
  // 标签
  var tb=['📝 记账','📋 账单','📊 统计','💳 预算'];
  ctx.font='11px sans-serif';
  for(var i=0;i<tb.length;i++){
    ctx.fillStyle=i===0?'rgba(255,255,255,.18)':'transparent';
    ctx.fillRect(14+i*72,52,66,24);
    ctx.fillStyle=i===0?'#fff':'#334155';
    ctx.fillText(tb[i],26+i*72,70);
  }
  // 卡片
  ctx.fillStyle='#fff';roundRect(ctx,14,86,w-28,260,10);
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#4338ca';ctx.font='13px sans-serif';ctx.fillText('📝 记一笔',28,112);
  var inp=['选择分类','金额','备注(选填)'];
  for(var i=0;i<3;i++){
    ctx.fillStyle='#f1f5f9';roundRect(ctx,28,124+i*40,170,32,6);
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#64748b';ctx.font='11px sans-serif';ctx.fillText(inp[i],42,146+i*40);
  }
  // 确认
  ctx.fillStyle='#4f46e5';roundRect(ctx,28,252,w-56,34,7);
  ctx.fillStyle='#fff';ctx.font='13px sans-serif';ctx.fillText('✅ 确认记账',w/2-44,276);
  // 记录列表
  ctx.fillStyle='#475569';ctx.font='11px sans-serif';ctx.fillText('最近记录',28,310);
  ctx.fillStyle='#fff';roundRect(ctx,28,320,w-56,96,6);
  ctx.strokeStyle='#e2e8f0';ctx.stroke();
  var its=[['🍚 餐饮','¥35.00','午餐'],['🚇 交通','¥6.00','地铁'],['🛒 购物','¥128.00','超市']];
  for(var i=0;i<its.length;i++){
    var y=328+i*30;
    ctx.fillStyle='#1e293b';ctx.font='11px sans-serif';ctx.fillText(its[i][0],42,y);
    ctx.fillStyle='#4f46e5';ctx.font='bold 11px sans-serif';ctx.fillText(its[i][1],205,y);
    ctx.fillStyle='#64748b';ctx.font='10px sans-serif';ctx.fillText(its[i][2],280,y);
    ctx.strokeStyle='#f1f5f9';ctx.beginPath();ctx.moveTo(42,y+11);ctx.lineTo(w-28,y+11);ctx.stroke();
  }
  ctx.fillStyle='rgba(0,0,0,.06)';ctx.font='8px sans-serif';ctx.fillText(url,14,h-10);
  updateTexture();
}

// ====== 布料物理（旗帜物理） ======
function initCloth(){
  particles=[];constraints=[];
  for(var y=0;y<H;y++){
    for(var x=0;x<W;x++){
      var px=(x-W/2)*SPACING;
      var py=3.0-y/H*5.5;
      var pz=(y-H/2)*SPACING*0.3;
      particles.push({
        x:px,y:py,z:pz,ox:px,oy:py,oz:pz,
        vx:0,vy:0,vz:0,pinned:false,mass:0.12
      });
    }
  }
  // 左边一整列固定在旗杆上
  for(var fy=0;fy<H;fy++)pinParticle(0,fy);
  // 结构约束
  for(var y=0;y<H;y++){
    for(var x=0;x<W;x++){
      var idx=y*W+x;
      if(x<W-1)constraints.push({a:idx,b:idx+1,rest:SPACING});
      if(y<H-1)constraints.push({a:idx,b:idx+W,rest:SPACING});
      if(x<W-1&&y<H-1){
        constraints.push({a:idx,b:idx+W+1,rest:SPACING*1.414});
        constraints.push({a:idx+1,b:idx+W,rest:SPACING*1.414});
      }
    }
  }
}

function pinParticle(x,y){
  var idx=y*W+x;
  if(particles[idx]){particles[idx].pinned=true;}
}

function resetCloth(){
  initCloth();
  // 旗杆圆柱体跟随
  if(poleMesh)scene.remove(poleMesh);
  createPole();
}

function toggleWind(){
  windEnabled=!windEnabled;
  document.getElementById('windBtn').className=windEnabled?'active':'';
}

function simulateCloth(){
  var step=0.6;
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    if(p.pinned)continue;
    p.vx=p.x-p.ox;p.vy=p.y-p.oy;p.vz=p.z-p.oz;
    p.vx*=DAMPING;p.vy*=DAMPING;p.vz*=DAMPING;
    p.ox=p.x;p.oy=p.y;p.oz=p.z;
    p.vy+=GRAVITY*p.mass*step;
    if(windEnabled){
      var wt=Date.now()/2000;
      p.vx+=wind.x*(0.6+Math.sin(wt+i*0.05)*0.4);
      p.vz+=wind.z*(0.5+Math.cos(wt*0.7+i*0.03)*0.3);
    }
    p.vx*=0.998;p.vz*=0.998;
    p.x+=p.vx*step;p.y+=p.vy*step;p.z+=p.vz*step;
  }
  for(var it=0;it<12;it++){
    for(var i=0;i<constraints.length;i++){
      var c=constraints[i];
      var p1=particles[c.a],p2=particles[c.b];
      var dx=p2.x-p1.x,dy=p2.y-p1.y,dz=p2.z-p1.z;
      var dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(dist<0.001)dist=0.001;
      var diff=(dist-c.rest)/dist;
      var off=diff*STIFFNESS*0.5;
      if(!p1.pinned){p1.x+=dx*off;p1.y+=dy*off;p1.z+=dz*off;}
      if(!p2.pinned){p2.x-=dx*off;p2.y-=dy*off;p2.z-=dz*off;}
    }
  }
  if(isDragging&&dragParticle!==null&&dragParticle<particles.length){
    var dp=particles[dragParticle];
    var dx=mouse3D.x-dp.x,dy=mouse3D.y-dp.y,dz=mouse3D.z-dp.z;
    var dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist>SPACING*1.5){dx=dx/dist*SPACING*1.5;dy=dy/dist*SPACING*1.5;dz=dz/dist*SPACING*1.5;}
    dp.x+=dx*0.12;dp.y+=dy*0.12;dp.z+=dz*0.12;
  }
}

// ====== 旗杆 ======
var poleMesh;
function createPole(){
  // 竖直圆柱
  var poleGeo=new THREE.CylinderGeometry(0.06,0.06,6.2,8,1);
  // 金色金属
  var poleMat=new THREE.MeshStandardMaterial({
    color:0xb8860b,metalness:0.8,roughness:0.3
  });
  poleMesh=new THREE.Mesh(poleGeo,poleMat);
  poleMesh.position.set(-W/2*SPACING,0,0);
  poleMesh.castShadow=true;
  scene.add(poleMesh);
  // 杆顶球
  var ballGeo=new THREE.SphereGeometry(0.1,8,8);
  var ball=new THREE.Mesh(ballGeo,poleMat);
  ball.position.set(-W/2*SPACING,3.1,0);
  scene.add(ball);
  // 底座
  var baseGeo=new THREE.CylinderGeometry(0.2,0.3,0.15,12,1);
  var baseMat=new THREE.MeshStandardMaterial({color:0x555555,metalness:0.6,roughness:0.4});
  var base=new THREE.Mesh(baseGeo,baseMat);
  base.position.set(-W/2*SPACING,-0.05,0);
  scene.add(base);
}

// ====== Three.js ======
function updateClothMesh(){
  if(!clothGeometry)return;
  var pos=clothGeometry.attributes.position.array;
  var norm=clothGeometry.attributes.normal.array;
  for(var y=0;y<H;y++){
    for(var x=0;x<W;x++){
      var idx=y*W+x,p=particles[idx],vi=idx*3;
      pos[vi]=p.x;pos[vi+1]=p.y;pos[vi+2]=p.z;
    }
  }
  clothGeometry.computeVertexNormals();
  pos.needsUpdate=true;norm.needsUpdate=true;
}

function createCloth(){
  initCloth();initTexture();
  var tex=new THREE.CanvasTexture(canvas);
  tex.minFilter=THREE.LinearMipmapLinearFilter;
  tex.magFilter=THREE.LinearFilter;
  tex.anisotropy=4;
  
  clothGeometry=new THREE.BufferGeometry();
  var v=[],uv=[],idx=[];
  for(var y=0;y<H;y++)for(var x=0;x<W;x++){v.push(0,0,0);uv.push(x/(W-1),1-y/(H-1));}
  for(var y=0;y<H-1;y++)for(var x=0;x<W-1;x++){
    var a=y*W+x,b=y*W+x+1,c=(y+1)*W+x,d=(y+1)*W+x+1;
    idx.push(a,b,c,b,d,c);
  }
  clothGeometry.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  clothGeometry.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  clothGeometry.setIndex(idx);clothGeometry.computeVertexNormals();
  
  var mat=new THREE.MeshPhysicalMaterial({
    map:tex,side:THREE.DoubleSide,
    roughness:0.1,metalness:0.05,clearcoat:0.5,clearcoatRoughness:0.15,
    specularIntensity:0.3,specularColor:new THREE.Color(0x8888ff)
  });
  clothMesh=new THREE.Mesh(clothGeometry,mat);
  clothMesh.castShadow=true;clothMesh.receiveShadow=true;
  scene.add(clothMesh);
  createPole();
}

function updateTexture(){
  if(!clothMesh)return;
  clothMesh.material.map=new THREE.CanvasTexture(canvas);
  clothMesh.material.map.needsUpdate=true;
  if(clothMesh.material.map.colorSpace)clothMesh.material.map.colorSpace='srgb';
}

// ====== 场景 ======
function initScene(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x050510);
  
  camera=new THREE.PerspectiveCamera(35,window.innerWidth/window.innerHeight,0.1,50);
  camera.position.set(2.5,1.2,6);
  camera.lookAt(0,0,0);
  
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.3;
  document.body.appendChild(renderer.domElement);
  
  var amb=new THREE.AmbientLight(0x8888ff,0.6);scene.add(amb);
  var hemi=new THREE.HemisphereLight(0x8888ff,0x444422,0.5);scene.add(hemi);
  var light=new THREE.DirectionalLight(0xffffff,2.0);
  light.position.set(4,8,6);light.castShadow=true;scene.add(light);
  var fl=new THREE.DirectionalLight(0xaaaaff,0.8);
  fl.position.set(-4,2,-5);scene.add(fl);
  var bl=new THREE.DirectionalLight(0x88aaff,0.5);
  bl.position.set(0,0,-7);scene.add(bl);
  
  // 地面
  var gndGeo=new THREE.PlaneGeometry(20,20);
  var gndMat=new THREE.MeshStandardMaterial({color:0x080818,roughness:0.9,metalness:0.1,transparent:true,opacity:0.6});
  var gnd=new THREE.Mesh(gndGeo,gndMat);
  gnd.rotation.x=-Math.PI/2;gnd.position.y=-0.3;gnd.receiveShadow=true;
  scene.add(gnd);
  
  createCloth();
}

// ====== 交互 ======
function setupInteraction(){
  var el=renderer.domElement;
  el.addEventListener('wheel',function(e){
    e.preventDefault();
    camera.position.z+=e.deltaY*0.008;
    camera.position.z=Math.max(4,Math.min(20,camera.position.z));
  },{passive:false});
  
  el.addEventListener('mousedown',function(e){
    mouse.x=(e.clientX/window.innerWidth)*2-1;
    mouse.y=-(e.clientY/window.innerHeight)*2+1;
    if(e.shiftKey){isRotating=true;prevMouse.x=e.clientX;prevMouse.y=e.clientY;return;}
    raycaster.setFromCamera(mouse,camera);
    var hits=raycaster.intersectObject(clothMesh);
    if(hits.length>0){
      isDragging=true;
      var pt=hits[0].point,uv=hits[0].uv;
      var ux=Math.round(uv.x*(W-1)),uy=Math.round((1-uv.y)*(H-1));
      dragParticle=uy*W+ux;
      mouse3D.copy(pt);
    }else{isRotating=true;prevMouse.x=e.clientX;prevMouse.y=e.clientY;}
  });
  
  el.addEventListener('mousemove',function(e){
    if(isRotating){
      rotation.y+=(e.clientX-prevMouse.x)*0.006;
      rotation.x+=(e.clientY-prevMouse.y)*0.006;
      rotation.x=Math.max(-0.8,Math.min(0.8,rotation.x));
      prevMouse.x=e.clientX;prevMouse.y=e.clientY;
    }
    if(isDragging){
      mouse.x=(e.clientX/window.innerWidth)*2-1;
      mouse.y=-(e.clientY/window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse,camera);
      var plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
      var ip=new THREE.Vector3();
      raycaster.ray.intersectPlane(plane,ip);
      if(ip){mouse3D.copy(ip);mouse3D.applyEuler(new THREE.Euler(-rotation.x,-rotation.y,0));}
    }
  });
  
  el.addEventListener('mouseup',function(){isDragging=false;dragParticle=null;isRotating=false;});
  
  // 触屏
  el.addEventListener('touchstart',function(e){
    e.preventDefault();
    if(e.touches.length===1){
      var t=e.touches[0];
      mouse.x=(t.clientX/window.innerWidth)*2-1;
      mouse.y=-(t.clientY/window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse,camera);
      var hits=raycaster.intersectObject(clothMesh);
      if(hits.length>0){
        isDragging=true;
        var pt=hits[0].point,uv=hits[0].uv;
        var ux=Math.round(uv.x*(W-1)),uy=Math.round((1-uv.y)*(H-1));
        dragParticle=uy*W+ux;mouse3D.copy(pt);
      }
    }else if(e.touches.length===2){
      isRotating=true;
    }
  },{passive:false});
  
  el.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(isDragging&&e.touches.length>0){
      var t=e.touches[0];
      mouse.x=(t.clientX/window.innerWidth)*2-1;
      mouse.y=-(t.clientY/window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse,camera);
      var plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
      var ip=new THREE.Vector3();
      raycaster.ray.intersectPlane(plane,ip);
      if(ip)mouse3D.copy(ip);
    }
  },{passive:false});
  
  el.addEventListener('touchend',function(){isDragging=false;dragParticle=null;isRotating=false;});
  window.addEventListener('resize',function(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}

// ====== 加载网页 ======
function loadWebPage(){
  var url=document.getElementById('url').value.trim();
  if(!url.startsWith('http'))url='https://'+url;
  drawWebContent(url);
  toast('已加载');
}

function toast(msg){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(5,5,16,.9);color:#e2e8f0;padding:6px 14px;border-radius:8px;font-size:11px;z-index:999;border:1px solid rgba(255,255,255,.08)';
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(function(){d.remove()},1500);
}

// ====== 动画 ======
function animate(){
  requestAnimationFrame(animate);
  for(var i=0;i<3;i++)simulateCloth();
  updateClothMesh();
  scene.rotation.x=rotation.x*0.3;
  scene.rotation.y=rotation.y;
  renderer.render(scene,camera);
}

function boot(){
  initScene();setupInteraction();animate();
  document.getElementById('url').addEventListener('keydown',function(e){if(e.key==='Enter')loadWebPage()});
  setTimeout(function(){toast('🖱️ 拖拽旗面 · SHIFT+拖拽旋转')},1200);
  if('serviceWorker'in navigator)navigator.serviceWorker.register('web/sw.js').catch(function(){});
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
</script>
</body>
</html>
